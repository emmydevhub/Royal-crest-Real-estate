<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <section class="properties">

    <div class="section-title">

        <h2>Apartments</h2>

        <p>
            Premium apartments in prime locations.
        </p>

    </div>

    <div class="property-grid">

        <!-- Luxury Penthouse -->

        <div class="property-card">

            <img src="penthouse.png" alt="Luxury Penthouse">

            <div class="property-content">

                <h3>Luxury Penthouse</h3>

                <p>Victoria Island, Lagos</p>

                <h4>₦320,000,000</h4>

                <a href="penthouse.html"
                class="property-btn">

                    View Details

                </a>

            </div>

        </div>

        <!-- Executive Apartment -->

        <div class="property-card">

            <img src="executive-main.png"
            alt="Executive Apartment">

            <div class="property-content">

                <h3>Executive Apartment</h3>

                <p>Ikoyi, Lagos</p>

                <h4>₦150,000,000</h4>

                <a href="property-apartment.html"
                class="property-btn">

                    View Details

                </a>

            </div>

        </div>

        <!-- Skyview Apartment -->

        <div class="property-card">

            <img src="skyview-exterior.png"
            alt="Skyview Apartment">

            <div class="property-content">

                <h3>Skyview Apartment</h3>

                <p>Lekki Phase 1, Lagos</p>

                <h4>₦120,000,000</h4>

                <a href="skyview.html"
                class="property-btn">

                    View Details

                </a>

            </div>

        </div>

    </div>

</section> 

<script src="script.js"></script>
</body>
</html>
