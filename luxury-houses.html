<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Houses | Royal Crest Homes</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="properties">

    <div class="section-title">

        <h2>Luxury Houses</h2>

        <p>
            Explore our premium collection of luxury villas, mansions and duplexes.
        </p>

    </div>

    <div class="property-grid">

        <!-- Luxury Villa -->

        <div class="property-card">

            <img src="property-villa.png" alt="Luxury Villa">

            <div class="property-content">

                <h3>Luxury Villa</h3>

                <p>Lekki, Lagos</p>

                <h4>₦250,000,000</h4>

                <a href="property-villa.html"
                class="property-btn">

                    View Details

                </a>

            </div>

        </div>

        <!-- Waterfront Mansion -->

        <div class="property-card">

            <img src="waterfront-mansion.png"
            alt="Waterfront Mansion">

            <div class="property-content">

                <h3>Waterfront Mansion</h3>

                <p>Banana Island, Lagos</p>

                <h4>₦550,000,000</h4>

                <a href="property-mansion.html"
                class="property-btn">

                    View Details

                </a>

            </div>

        </div>

        <!-- Modern Duplex -->

        <div class="property-card">

            <img src="duplex.png"
            alt="Modern Duplex">

            <div class="property-content">

                <h3>Modern Duplex</h3>

                <p>Abuja</p>

                <h4>₦180,000,000</h4>

                <a href="property-duplex.html"
                class="property-btn">

                    View Details

                </a>

            </div>

        </div>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
