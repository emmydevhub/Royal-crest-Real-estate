<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commercial Spaces | Royal Crest Homes</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="properties">

    <div class="section-title">

        <h2>Commercial Spaces</h2>

        <p>
            Premium office buildings and commercial investment properties.
        </p>

    </div>

    <div class="property-grid">

        <!-- Corporate Office Tower -->

        <div class="property-card">

            <img src="office-tower.png" alt="Corporate Office Tower">

            <div class="property-content">

                <h3>Corporate Office Tower</h3>

                <p>Victoria Island, Lagos</p>

                <h4>₦800,000,000</h4>

                <a href="property-office-tower.html"
                class="property-btn">

                    View Details

                </a>

            </div>

        </div>

        <!-- Business Plaza -->

        <div class="property-card">

            <img src="business-plaza.png" alt="Business Plaza">

            <div class="property-content">

                <h3>Business Plaza</h3>

                <p>Ikeja, Lagos</p>

                <h4>₦650,000,000</h4>

                <a href="property-business-plaza.html"
                class="property-btn">

                    View Details

                </a>

            </div>

        </div>

        <!-- Shopping Complex -->

        <div class="property-card">

            <img src="shopping-complex.png" alt="Shopping Complex">

            <div class="property-content">

                <h3>Shopping Complex</h3>

                <p>Abuja</p>

                <h4>₦500,000,000</h4>

                <a href="property-shopping-complex.html"
